<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>易經交互式手冊 - 暗黑優化版</title>
    <style>
        :root {
            --iching-red: #bc2b1a; 
            --tag-bg: #5a5a5a;
            --bg-color: #f9f6f2;
            --container-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #d1c7b7;
            --card-bg: #fdfaf5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --iching-red: #a32216;
                --tag-bg: #3d3d3d;
                --bg-color: #121212;
                --container-bg: #1e1e1e;
                --text-main: #e0e0e0;
                --text-secondary: #b0b0b0;
                --border-color: #444444;
                --card-bg: #2a2a2a;
            }
        }

        body { 
            font-family: "PingFang SC", "Microsoft JhengHei", serif; 
            background: var(--bg-color); 
            margin: 0; padding: 20px; 
            color: var(--text-main); 
            display: flex; justify-content: center;
        }

        .app-container { 
            width: 100%; max-width: 1000px; 
            background: var(--container-bg); 
            border: 1px solid var(--border-color); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
            padding: 40px; 
        }
        
        .top-header { border-bottom: 2px solid var(--iching-red); margin-bottom: 30px; padding-bottom: 10px; }
        .top-header h1 { color: var(--iching-red); margin: 0; font-size: 2.4em; border-left: 8px solid var(--iching-red); padding-left: 20px; }

        .summary-box { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px; }
        .summary-item { 
            width: 100%; max-width: 750px; 
            background: var(--card-bg); 
            padding: 12px 20px; 
            border: 1px solid var(--border-color); 
            border-radius: 4px; 
            display: flex; align-items: baseline; 
        }
        .label { font-weight: bold; color: var(--iching-red); min-width: 80px; flex-shrink: 0; }
        .content { line-height: 1.6; color: var(--text-main); }

        .main-content { display: flex; gap: 50px; align-items: flex-start; border-top: 1px solid var(--border-color); padding-top: 30px; }

        .gua-visual { display: flex; flex-direction: column; align-items: center; min-width: 320px; padding: 10px; }
        .line-wrapper { display: flex; align-items: center; width: 100%; margin: 10px 0; cursor: pointer; }
        
        .line-label { 
            width: 50px; height: 32px; 
            background: var(--tag-bg); color: #ffffff; 
            font-size: 13px; display: flex; align-items: center; justify-content: center; 
            border-radius: 4px 0 0 4px; margin-right: 10px; font-weight: bold;
        }

        .line-body { flex: 1; height: 32px; display: flex; transition: 0.2s; }
        .line-wrapper:hover .line-body { opacity: 0.8; transform: scaleX(1.02); }
        
        .yang { background: var(--iching-red); }
        .yin { display: flex; justify-content: space-between; background: transparent; }
        .yin span { background: var(--iching-red); flex: 1; height: 100%; }
        .yin .gap { width: 15%; background: transparent; }

        .yaoci-section { flex: 1; }
        .yao-card { margin-bottom: 25px; padding-left: 15px; border-left: 4px solid var(--border-color); }
        .yao-title { font-weight: bold; font-size: 1.2em; color: var(--text-main); margin-bottom: 6px; }
        .xiaoxiang { color: var(--text-secondary); font-size: 0.95em; font-style: italic; }
        .red-tag { color: var(--iching-red); font-weight: bold; margin-bottom: 15px; display: block; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-header"><h1 id="guaName">加載中...</h1></div>
    <div class="summary-box">
        <div class="summary-item"><span class="label">【卦辭】</span><div id="guaci" class="content"></div></div>
        <div class="summary-item"><span class="label">【彖傳】</span><div id="tuan" class="content"></div></div>
        <div class="summary-item"><span class="label">【大象】</span><div id="daxiang" class="content"></div></div>
    </div>
    <div class="main-content">
        <div class="gua-visual" id="guaContainer"></div>
        <div class="yaoci-section">
            <span class="red-tag">【爻辭與小象】</span>
            <div id="yaociList"></div>
        </div>
    </div>
</div>

        { text: "六二：係小子，失丈夫。", xiang: "係小子，弗兼與也。" },
        { text: "六三：係丈夫，失小子。隨有求得，利居貞。", xiang: "係丈夫，志舍下也。" },
        { text: "九四：隨有獲，貞凶，有孚在道，以明，何咎。", xiang: "隨有獲，其義凶也。有孚在道，明功也。" },
        { text: "九五：孚于嘉，吉。", xiang: "孚于嘉吉，位正中也。" },
        { text: "上六：拘係之，乃從維之，王用亨于西山。", xiang: "拘係之，上窮也。" }
    ]},
    "011001": { name: "山風蠱", guaci: "元亨，利涉大川。先甲三日，後甲三日。", tuan: "蠱，剛上而柔下，巽而止，蠱。", daxiang: "山下有風，蠱。君子以振民育德。", yaoci: [
        { text: "初六：幹父之蠱，有子，考無咎，厲，終吉。", xiang: "幹父之蠱，意承考也。" },
        { text: "九二：幹母之蠱，不可貞。", xiang: "幹母之蠱，得中道也。" },
        { text: "九三：幹父之蠱，小有悔，無大咎。", xiang: "幹父之蠱，終無咎也。" },
        { text: "六四：裕父之蠱，往見吝。", xiang: "裕父之蠱，往未得也。" },
        { text: "六五：幹父之蠱，用譽。", xiang: "幹父之蠱，承以德也。" },
        { text: "上九：不事王侯，高尚其事。", xiang: "不事王侯，志可則也。" }
    ]},
    "110000": { name: "地澤臨", guaci: "元亨利貞。至於八月有凶。", tuan: "臨，剛浸而長。說而順，剛中而應。", daxiang: "澤上有地，臨。君子以教思無窮，容保民無疆。", yaoci: [
        { text: "初九：咸臨，貞吉。", xiang: "咸臨貞吉，志行正也。" },
        { text: "九二：咸臨，吉無不利。", xiang: "咸臨吉無不利，未順命也。" },
        { text: "六三：甘臨，無攸利；既憂之，無咎。", xiang: "甘臨，位不當也。既憂之，咎不長也。" },
        { text: "六四：至臨，無咎。", xiang: "至臨無咎，位適當也。" },
        { text: "六五：知臨，大君之宜，吉。", xiang: "大君之宜，行中之謂也。" },
        { text: "上六：敦臨，吉無咎。", xiang: "敦臨之吉，志在內也。" }
    ]},
    "000011": { name: "風地觀", guaci: "盥而不薦，有孚顒若。", tuan: "大觀在上，順而巽，中正以觀天下。", daxiang: "風行地上，觀。先王以省方觀民設教。", yaoci: [
        { text: "初六：童觀，小人無咎，君子吝。", xiang: "初六童觀，小人道也。" },
        { text: "六二：闚觀，利女貞。", xiang: "闚觀女貞，亦可醜也。" },
        { text: "六三：觀我生，進退。", xiang: "觀我生進退，未失道也。" },
        { text: "六四：觀國之光，利用賓于王。", xiang: "觀國之光，尚賓也。" },
        { text: "九五：觀我生，君子無咎。", xiang: "觀我生，觀民也。" },
        { text: "上九：觀其生，君子無咎。", xiang: "觀其生，志未平也。" }
    ]},
    "100101": { name: "火雷噬嗑", guaci: "亨。利用獄。", tuan: "頤中有物，曰噬嗑。噬嗑而亨，剛柔分，動而明。", daxiang: "雷電，噬嗑。先王以明罰敕法。", yaoci: [
        { text: "初九：屨校滅趾，無咎。", xiang: "屨校滅趾，不行也。" },
        { text: "六二：噬膚滅鼻，無咎。", xiang: "噬膚滅鼻，乘剛也。" },
        { text: "六三：噬臘肉，遇毒；小吝，無咎。", xiang: "遇毒，位不當也。" },
        { text: "九四：噬乾胏，得金矢；利艱貞，吉。", xiang: "利艱貞吉，未光也。" },
        { text: "六五：噬乾肉，得黃金；貞厲，無咎。", xiang: "貞厲無咎，得當也。" },
        { text: "上九：何校滅耳，凶。", xiang: "何校滅耳，聰不明也。" }
    ]},
    "101001": { name: "山火賁", guaci: "亨。小利有攸往。", tuan: "賁，亨。柔來而文剛，故亨。分剛上而文柔，故小利有攸往。", daxiang: "山下有火，賁。君子以明庶政，無敢折獄。", yaoci: [
        { text: "初九：賁其趾，舍車而徒。", xiang: "舍車而徒，義弗乘也。" },
        { text: "六二：賁其須。", xiang: "賁其須，與上興也。" },
        { text: "九三：賁如濡如，永貞吉。", xiang: "永貞之吉，終莫之陵也。" },
        { text: "六四：賁如皤如，白馬翰如，匪寇婚媾。", xiang: "六四當位，疑也。匪寇婚媾，終無尤也。" },
        { text: "六五：賁于丘園，束帛戔戔，吝，終吉。", xiang: "六五之吉，有喜也。" },
        { text: "上九：白賁，無咎。", xiang: "白賁無咎，上得志也。" }
    ]},
    "000001": { name: "山地剝", guaci: "不利有攸往。", tuan: "剝，剝也，柔變剛也。不利有攸往，小人長也。", daxiang: "山附于地，剝。上以厚下安宅。", yaoci: [
        { text: "初六：剝床以足，蔑貞凶。", xiang: "剝床以足，以滅下也。" },
        { text: "六二：剝床以辨，蔑貞凶。", xiang: "剝床以辨，未有與也。" },
        { text: "六三：剝之，無咎。", xiang: "剝之無咎，失上下也。" },
        { text: "六四：剝床以膚，凶。", xiang: "剝床以膚，切近災也。" },
        { text: "六五：貫魚，以宮人寵，無不利。", xiang: "以宮人寵，終無尤也。" },
        { text: "上九：碩果不食，君子得輿，小人剝廬。", xiang: "君子得輿，民所載也。小人剝廬，終不可用也。" }
    ]},
    "100000": { name: "地雷復", guaci: "亨。出入無疾，朋來無咎。反復其道，七日來復，利有攸往。", tuan: "復，亨。剛反，動而以順行。", daxiang: "地中有雷，復。先王以至日閉關，商旅不行，后不省方。", yaoci: [
        { text: "初九：不遠復，無祗悔，元吉。", xiang: "不遠之復，以修身也。" },
        { text: "六二：休復，吉。", xiang: "休復之吉，以下仁也。" },
        { text: "六三：頻復，厲無咎。", xiang: "頻復之厲，義無咎也。" },
        { text: "六四：中行獨復。", xiang: "中行獨復，以從道也。" },
        { text: "六五：敦復，無悔。", xiang: "敦復無悔，中以自考也。" },
        { text: "上六：迷復，凶，有災眚。用行師，終有大敗，以其國君凶，至於十年不克征。", xiang: "迷復之凶，反君道也。" }
    ]},
    "100111": { name: "天雷無妄", guaci: "元亨，利貞。其匪正有眚，不利有攸往。", tuan: "無妄，剛自外來，而為主於內。", daxiang: "天下雷行，物與無妄。先王以茂對時，養萬物。", yaoci: [
        { text: "初九：無妄，往吉。", xiang: "無妄之往，得志也。" },
        { text: "六二：不耕獲，不菑畬，則利有攸往。", xiang: "不耕獲，未富也。" },
        { text: "六三：無妄之災，或繫之牛，行人之得，邑人之災。", xiang: "行人得牛，邑人災也。" },
        { text: "九四：可貞，無咎。", xiang: "可貞無咎，固有之也。" },
        { text: "九五：無妄之疾，勿藥有喜。", xiang: "無妄之藥，不可試也。" },
        { text: "上九：無妄，行有眚，無攸利。", xiang: "無妄之行，窮之災也。" }
    ]},
    "111001": { name: "山天大畜", guaci: "利貞。不家食吉，利涉大川。", tuan: "大畜，剛健篤實輝光，日新其德。", daxiang: "天在山中，大畜。君子以多識前言往行，以畜其德。", yaoci: [
        { text: "初九：有厲，利已。", xiang: "有厲利已，不犯災也。" },
        { text: "九二：輿說輹。", xiang: "輿說輹，中無尤也。" },
        { text: "九三：良馬逐，利艱貞，日閑輿衛，利有攸往。", xiang: "利有攸往，上合志也。" },
        { text: "六四：童牛之牿，元吉。", xiang: "六四元吉，有喜也。" },
        { text: "六五：豶豕之牙，吉。", xiang: "六五之吉，有慶也。" },
        { text: "上九：何天之衢，亨。", xiang: "何天之衢，道大行也。" }
    ]},
    "100001": { name: "山雷頤", guaci: "貞吉。觀頤，自求口實。", tuan: "頤，貞吉，養正也。觀頤，觀其所養也。", daxiang: "山下有雷，頤。君子以慎言語，節飲食。", yaoci: [
        { text: "初九：舍爾靈龜，觀我朵頤，凶。", xiang: "觀我朵頤，亦不足貴也。" },
        { text: "六二：顛頤，拂經，于丘頤，征凶。", xiang: "六二征凶，行失類也。" },
        { text: "六三：拂頤，貞凶，十年勿用，無攸利。", xiang: "十年勿用，道大悖也。" },
        { text: "六四：顛頤，吉，虎視眈眈，其欲逐逐，無咎。", xiang: "顛頤之吉，上施光也。" },
        { text: "六五：拂經，居貞吉，不可涉大川。", xiang: "居貞之吉，順以從上也。" },
        { text: "上九：由頤，厲吉，利涉大川。", xiang: "由頤厲吉，大有慶也。" }
    ]},
    "011110": { name: "澤風大過", guaci: "棟撓，利有攸往，亨。", tuan: "大過，大者過也。棟撓，本末弱也。", daxiang: "澤滅木，大過。君子以獨立不懼，遁世無悶。", yaoci: [
        { text: "初六：藉用白茅，無咎。", xiang: "藉用白茅，柔在下也。" },
        { text: "九二：枯楊生稊，老夫得其女妻，無不利。", xiang: "老夫女妻，過以相與也。" },
        { text: "九三：棟撓，凶。", xiang: "棟撓之凶，不可以有輔也。" },
        { text: "九四：棟隆，吉；有它吝。", xiang: "棟隆之吉，不下撓也。" },
        { text: "九五：枯楊生華，老婦得其士夫，無咎無譽。", xiang: "枯楊生華，何可久也。老婦士夫，亦可醜也。" },
        { text: "上六：過涉滅頂，凶，無咎。", xiang: "過涉之凶，不可咎也。" }
    ]},
    "010010": { name: "坎為水", guaci: "習坎，有孚，維心亨，行有尚。", tuan: "習坎，重險也。水流而不盈，行險而不失其信。", daxiang: "水洊至，習坎。君子以常德行，習教事。", yaoci: [
        { text: "初六：習坎，入于坎窞，凶。", xiang: "習坎入坎，失道凶也。" },
        { text: "九二：坎有險，求小得。", xiang: "求小得，未出中也。" },
        { text: "六三：來之坎坎，險且枕，入于坎窞，勿用。", xiang: "來之坎坎，終無功也。" },
        { text: "六四：樽酒簋貳，用缶，納約自牖，終無咎。", xiang: "樽酒簋貳，剛柔際也。" },
        { text: "九五：坎不盈，祇既平，無咎。", xiang: "坎不盈，中未大也。" },
        { text: "上六：係用徽纆，寘于叢棘，三歲不得，凶。", xiang: "上六失道，凶三歲也。" }
    ]},
    "101101": { name: "離為火", guaci: "利貞，亨。畜牝牛，吉。", tuan: "離，麗也；日月麗乎天，百穀草木麗乎土。", daxiang: "明兩作，離。大人以繼明照于四方。", yaoci: [
        { text: "初九：履錯然，敬之無咎。", xiang: "履錯之敬，以辟咎也。" },
        { text: "六二：黃離，元吉。", xiang: "黃離元吉，得中道也。" },
        { text: "九三：日昃之離，不鼓缶而歌，則大耋之嗟，凶。", xiang: "日昃之離，何可久也。" },
        { text: "九四：突如其來如，焚如，死如，棄如。", xiang: "突如其來如，無所容也。" },
        { text: "六五：出涕沱若，戚嗟若，吉。", xiang: "六五之吉，離王公也。" },
        { text: "上九：王用出征，有嘉折首，獲匪其醜，無咎。", xiang: "王用出征，以正邦也。" }
    ]},
    "001110": { name: "澤山咸", guaci: "亨，利貞，取女吉。", tuan: "咸，感也。柔上而剛下，二氣感應以相與。", daxiang: "山上有澤，咸。君子以虛受人。", yaoci: [
        { text: "初六：咸其拇。", xiang: "咸其拇，志在外也。" },
        { text: "六二：咸其腓，凶，居吉。", xiang: "雖凶居吉，順不害也。" },
        { text: "九三：咸其股，執其隨，往吝。", xiang: "咸其股，亦不處也。志在隨人，所執下也。" },
        { text: "九四：貞吉悔亡，憧憧往來，朋從爾思。", xiang: "貞吉悔亡，未感害也。憧憧往來，未光大也。" },
        { text: "九五：咸其脢，無悔。", xiang: "咸其脢，志末也。" },
        { text: "上六：咸其輔頰舌。", xiang: "咸其輔頰舌，滕口說也。" }
    ]},
    "011100": { name: "雷風恆", guaci: "亨，無咎，利貞，利有攸往。", tuan: "恆，久也。剛上而柔下，雷風相與，巽而動。", daxiang: "雷風，恆。君子以立不易方。", yaoci: [
        { text: "初六：浚恆，貞凶，無攸利。", xiang: "浚恆之凶，始求深也。" },
        { text: "九二：悔亡。", xiang: "九二悔亡，能久中也。" },
        { text: "九三：不恆其德，或承之羞，貞吝。", xiang: "不恆其德，無所容也。" },
        { text: "九四：田無禽。", xiang: "久非其位，安得禽也。" },
        { text: "六五：恆其德，貞，婦人吉，夫子凶。", xiang: "婦人貞吉，從一而終也。夫子制義，從婦凶也。" },
        { text: "上六：振恆，凶。", xiang: "振恆在上，大無功也。" }
    ]},
    "001111": { name: "天山遯", guaci: "亨，小利貞。", tuan: "遯而亨，剛當位而應，與時行也。", daxiang: "天下有山，遯。君子以遠小人，不惡而嚴。", yaoci: [
        { text: "初六：遯尾，厲，勿用有攸往。", xiang: "遯尾之厲，不往何災也。" },
        { text: "六二：執之用黃牛之革，莫之勝說。", xiang: "執用黃牛，固志也。" },
        { text: "九三：係遯，有疾厲，畜臣妾吉。", xiang: "係遯之厲，有疾憊也。畜臣妾吉，不可大事也。" },
        { text: "九四：好遯，君子吉，小人否。", xiang: "君子好遯，小人否也。" },
        { text: "九五：嘉遯，貞吉。", xiang: "嘉遯貞吉，以正志也。" },
        { text: "上九：肥遯，無不利。", xiang: "肥遯無不利，無所疑也。" }
    ]},
    "111100": { name: "雷天大壯", guaci: "利貞。", tuan: "大壯，大者壯也。剛以動，故壯。", daxiang: "雷在天上，大壯。君子以非禮弗履。", yaoci: [
        { text: "初九：壯于趾，征凶，有孚。", xiang: "壯于趾，其孚窮也。" },
        { text: "九二：貞吉。", xiang: "九二貞吉，以中也。" },
        { text: "九三：小人用壯，君子用罔，貞厲，羝羊觸藩，羸其角。", xiang: "小人用壯，君子罔也。" },
        { text: "九四：貞吉悔亡，藩決不羸，壯于大輿之輹。", xiang: "藩決不羸，尚往也。" },
        { text: "六五：喪羊于易，無悔。", xiang: "喪羊于易，位不當也。" },
        { text: "上六：羝羊觸藩，不能退，不能遂，無攸利，艱則吉。", xiang: "不能退遂，不詳也。艱則吉，咎不長也。" }
    ]},
    "000101": { name: "火地晉", guaci: "康侯用錫馬蕃庶，晝日三接。", tuan: "晉，進也。明出地上，順而麗乎大明。", daxiang: "明出地上，晉。君子以自昭明德。", yaoci: [
        { text: "初六：晉如摧如，貞吉，罔孚，裕無咎。", xiang: "晉如摧如，獨行正也。裕無咎，未受命也。" },
        { text: "六二：晉如愁如，貞吉，受茲介福，于其王母。", xiang: "受茲介福，以中正也。" },
        { text: "六三：眾允，悔亡。", xiang: "眾允之志，上行也。" },
        { text: "九四：晉如鼫鼠，貞厲。", xiang: "鼫鼠貞厲，位不當也。" },
        { text: "六五：悔亡，失得勿恤，往吉，無不利。", xiang: "失得勿恤，往有慶也。" },
        { text: "上九：晉其角，維用伐邑，厲吉無咎，貞吝。", xiang: "維用伐邑，道未光也。" }
    ]},
    "101000": { name: "地火明夷", guaci: "利艱貞。", tuan: "明入地中，明夷。內文明而外柔順，以蒙大難。", daxiang: "明入地中，明夷。君子以蒞眾，用晦而明。", yaoci: [
        { text: "初九：明夷于飛，垂其翼，君子于行，三日不食，有攸往，主人有言。", xiang: "君子于行，義不食也。" },
        { text: "六二：明夷，夷于左股，用拯馬壯，吉。", xiang: "六二之吉，順以則也。" },
        { text: "九三：明夷于南狩，得其大首，不可疾貞。", xiang: "南狩之志，乃大得也。" },
        { text: "六四：入于左腹，獲明夷之心，于出門庭。", xiang: "入于左腹，獲心意也。" },
        { text: "六五：箕子之明夷，利貞。", xiang: "箕子之貞，明不可息也。" },
        { text: "上六：不明晦，初登于天，後入于地。", xiang: "初登于天，照四國也。後入于地，失則也。" }
    ]},
    "101011": { name: "風火家人", guaci: "利女貞。", tuan: "家人，女正位乎內，男正位乎外。", daxiang: "風自火出，家人。君子以言有物，而行有恆。", yaoci: [
        { text: "初九：閑有家，悔亡。", xiang: "閑有家，志未變也。" },
        { text: "六二：無攸遂，在中饋，貞吉。", xiang: "六二之吉，順以巽也。" },
        { text: "九三：家人嗃嗃，悔厲吉；婦子嘻嘻，終吝。", xiang: "家人嗃嗃，未失也；婦子嘻嘻，失家節也。" },
        { text: "六四：富家，大吉。", xiang: "富家大吉，順在位也。" },
        { text: "九五：王假有家，勿恤，吉。", xiang: "王假有家，交相愛也。" },
        { text: "上九：有孚威如，終吉。", xiang: "威如之吉，反身之謂也。" }
    ]},
    "110101": { name: "火澤睽", guaci: "小事吉。", tuan: "睽，火動而上，澤動而下，二女同居，其志不同行。", daxiang: "上火下澤，睽。君子以同而異。", yaoci: [
        { text: "初九：悔亡，喪馬勿逐，自復；見惡人無咎。", xiang: "見惡人，以辟咎也。" },
        { text: "九二：遇主于巷，無咎。", xiang: "遇主于巷，未失道也。" },
        { text: "六三：見輿曳，其牛掣，其人天且劓，無初有終。", xiang: "見輿曳，位不當也。無初有終，遇剛也。" },
        { text: "九四：睽孤，遇元夫，交孚，厲無咎。", xiang: "交孚無咎，志行也。" },
        { text: "六五：悔亡，厥宗噬膚，往何咎。", xiang: "厥宗噬膚，往有慶也。" },
        { text: "上九：睽孤，見豕負塗，載鬼一車，先張之弧，後說之弧，匪寇婚媾，往遇雨則吉。", xiang: "遇雨之吉，群疑亡也。" }
    ]},
    "001010": { name: "水山蹇", guaci: "利西南，不利東北；利見大人，貞吉。", tuan: "蹇，難也，險在前也。見險而能止，知矣哉。", daxiang: "山上有水，蹇。君子以反身修德。", yaoci: [
        { text: "初六：往蹇，來譽。", xiang: "往蹇來譽，宜待也。" },
        { text: "六二：王臣蹇蹇，匪躬之故。", xiang: "王臣蹇蹇，終無尤也。" },
        { text: "九三：往蹇，來反。", xiang: "往蹇來反，內喜之也。" },
        { text: "六四：往蹇，來連。", xiang: "往蹇來連，當位實也。" },
        { text: "九五：大蹇，朋來。", xiang: "大蹇朋來，以中節也。" },
        { text: "上六：往蹇，來碩，吉；利見大人。", xiang: "往蹇來碩，志在內也。利見大人，以從貴也。" }
    ]},
    "010100": { name: "雷水解", guaci: "利西南，無所往，其來復吉。有攸往，夙吉。", tuan: "解，險以動，動而免乎險，解。", daxiang: "雷雨作，解。君子以赦過宥罪。", yaoci: [
        { text: "初六：無咎。", xiang: "剛柔之際，義無咎也。" },
        { text: "九二：田獲三狐，得黃矢，貞吉。", xiang: "九二貞吉，得中道也。" },
        { text: "六三：負且乘，致寇至，貞吝。", xiang: "負且乘，亦可醜也，自我致戎，又誰咎也。" },
        { text: "九四：解而拇，朋至斯孚。", xiang: "解而拇，未當位也。" },
        { text: "六五：君子維有解，吉；有孚于小人。", xiang: "君子有解，小人退也。" },
        { text: "上六：公用射隼于高墉之上，獲之，無不利。", xiang: "公用射隼，以解悖也。" }
    ]},
	"110001": { 
        name: "山澤損", 
        guaci: "損，有孚，元吉，無咎，可貞，利有攸往。曷之用，二簋可用享。", 
        tuan: "損，損下益上，其道上行。損而有孚，元吉，無咎，可貞，利有攸往。", 
        daxiang: "山下有澤，損。君子以懲忿窒欲。",
        yaoci: [
            { text: "初九：已事遄往，無咎，酌損之。", xiang: "已事遄往，尚合志也。" },
            { text: "九二：利貞，征凶，弗損益之。", xiang: "九二利貞，中以為志也。" },
            { text: "六三：三人行，則損一人；一人行，則得其友。", xiang: "一人行，三則疑也。" },
            { text: "六四：損其疾，使遄有喜，無咎。", xiang: "損其疾，亦可喜也。" },
            { text: "六五：或益之十朋之龜，弗克違，元吉。", xiang: "六五元吉，自上佑也。" },
            { text: "上九：弗損益之，無咎，貞吉，利有攸往，得臣無家。", xiang: "弗損益之，大得志也。" }
        ]
    },
    "100011": { 
        name: "風雷益", 
        guaci: "利有攸往，利涉大川。", 
        tuan: "益，損上益下，民說無疆，自上下下，其道大光。", 
        daxiang: "風雷，益。君子以見善則遷，有過則改。",
        yaoci: [
            { text: "初九：利用為大作，元吉，無咎。", xiang: "元吉無咎，下不厚事也。" },
            { text: "六二：或益之十朋之龜，弗克違，永貞吉，王用享于帝，吉。", xiang: "或益之，自外來也。" },
            { text: "六三：益之用凶事，無咎，有孚中行，告公用圭。", xiang: "益用凶事，固有之也。" },
            { text: "六四：中行，告公從，利用為依遷國。", xiang: "告公從，以益志也。" },
            { text: "九五：有孚惠心，勿問元吉，有孚惠我德。", xiang: "有孚惠心，勿問之矣。惠我德，大得志也。" },
            { text: "上九：莫益之，或擊之，立心勿恆，凶。", xiang: "莫益之，偏辭也。或擊之，自外來也。" }
        ]
    },
    "111110": { 
        name: "澤天夬", 
        guaci: "揚于王庭，孚號，有厲，告自邑，不利即戎，利有攸往。", 
        tuan: "夬，決也，剛決柔也。健而說，決而和。", 
        daxiang: "澤上於天，夬。君子以施祿及下，居德則忌。",
        yaoci: [
            { text: "初九：壯于前趾，往不勝為吝。", xiang: "不勝而往，咎也。" },
            { text: "九二：惕號，莫夜有戎，勿恤。", xiang: "有戎勿恤，得中道也。" },
            { text: "九三：壯于頄，有凶；君子夬夬，獨行遇雨，若濡有慍，無咎。", xiang: "君子夬夬，終無咎也。" },
            { text: "九四：臀無膚，其行次且，牽羊悔亡，聞言不信。", xiang: "其行次且，位不當也。聞言不信，聰不明也。" },
            { text: "九五：莧陸夬夬，中行無咎。", xiang: "中行無咎，中未光也。" },
            { text: "上六：無號，終有凶。", xiang: "無號之凶，終不可長也。" }
        ]
    },
    "011111": { 
        name: "天風姤", 
        guaci: "女壯，勿用取女。", 
        tuan: "姤，遇也，柔遇剛也。勿用取女，不可與長也。", 
        daxiang: "天下有風，姤。后以施命誥四方。",
        yaoci: [
            { text: "初六：繫于金柅，貞吉；有攸往，見凶，羸豕孚蹢躅。", xiang: "繫于金柅，柔道牽也。" },
            { text: "九二：包有魚，無咎，不利賓。", xiang: "包有魚，義不及賓也。" },
            { text: "九三：臀無膚，其行次且，厲，無大咎。", xiang: "其行次且，行未牽也。" },
            { text: "九四：包無魚，起凶。", xiang: "無魚之凶，遠民也。" },
            { text: "九五：以杞包瓜，含章，有隕自天。", xiang: "九五含章，中正也。有隕自天，志不舍命也。" },
            { text: "上九：姤其角，吝，無咎。", xiang: "姤其角，上窮吝也。" }
        ]
    },
    "000110": { 
        name: "澤地萃", 
        guaci: "亨。王假有廟，利見大人，亨，利貞。用大牲吉，利有攸往。", 
        tuan: "萃，聚也。順以說，剛中而應，故聚也。", 
        daxiang: "澤上於地，萃。君子以除戎器，戒不虞。",
        yaoci: [
            { text: "初六：有孚不終，乃亂乃萃，若號，一握為笑，勿恤，往無咎。", xiang: "乃亂乃萃，其志亂也。" },
            { text: "六二：引吉，無咎，孚乃利用禴。", xiang: "引吉無咎，中未變也。" },
            { text: "六三：萃如嗟如，無攸利，往無咎，小吝。", xiang: "往無咎，上巽也。" },
            { text: "九四：大吉，無咎。", xiang: "大吉無咎，位不當也。" },
            { text: "九五：萃有位，無咎，匪孚，元永貞，悔亡。", xiang: "萃有位，志未光也。" },
            { text: "上六：齎咨涕洟，無咎。", xiang: "齎咨涕洟，未安上也。" }
        ]
    },
  /* --- 修正開始 --- */
    "011000": { 
        name: "地風升", 
        guaci: "元亨。用見大人，勿恤。南征吉。", 
        tuan: "升，柔以時升。巽而順，剛中而應，是以元亨。用見大人，勿恤，有慶也。南征吉，志行也。", 
        daxiang: "地中生木，升。君子以順德，積小以高大。",
        yaoci: [
            { text: "初六：允升，大吉。", xiang: "允升大吉，上合志也。" },
            { text: "九二：孚乃利用禴，無咎。", xiang: "九二之孚，有喜也。" },
            { text: "九三：升虛邑。", xiang: "升虛邑，無所疑也。" },
            { text: "六四：王用亨于岐山，吉，無咎。", xiang: "王用亨于岐山，順事也。" },
            { text: "六五：貞吉，升階。", xiang: "貞吉升階，大得志也。" },
            { text: "上六：冥升，利于不息之貞。", xiang: "冥升在上，消不富也。" }
        ]
    },
    "010110": { 
        name: "澤水困", 
        guaci: "亨。貞，大人吉，無咎。有言不信。", 
        tuan: "困，剛揜也。險以說，困而不失其所亨，其唯君子乎？貞大人吉，以剛中也。有言不信，尚口乃窮也。", 
        daxiang: "澤無水，困。君子以致命遂志。",
        yaoci: [
            { text: "初六：臀困于株木，入于幽谷，三歲不覿。", xiang: "入于幽谷，幽不明也。" },
            { text: "九二：困于酒食，朱紱方來，利用亨祀，征凶，無咎。", xiang: "困于酒食，中有慶也。" },
            { text: "六三：困于石，據于蒺藜，入于其宮，不見其妻，凶。", xiang: "據于蒺藜，乘剛也。入于其宮，不見其妻，不祥也。" },
            { text: "九四：來徐徐，困于金車，吝，有終。", xiang: "來徐徐，志在下也。雖不當位，有終也。" },
            { text: "九五：劓刖，困于赤紱，乃徐有說，利用祭祀。", xiang: "劓刖，志未得也。乃徐有說，以中直也。利用祭祀，受福也。" },
            { text: "上六：困于葛藟，于臲卼，曰動悔有悔，征吉。", xiang: "困于葛藟，未當也。動悔有悔，吉行也。" }
        ]
    },
    /* --- 修正結束 --- */
    "011010": { 
        name: "水風井", 
        guaci: "改邑不改井，無喪無得，往來井井。汔至，亦未繘井，羸其瓶，凶。", 
        tuan: "巽乎水而上水，井；井養而不窮也。", 
        daxiang: "木上有水，井。君子以勞民勸相。",
        yaoci: [
            { text: "初六：井泥不食，舊井無禽。", xiang: "井泥不食，下也。舊井無禽，時舍也。" },
            { text: "九二：井谷射鮒，甕敝漏。", xiang: "井谷射鮒，無與也。" },
            { text: "九三：井渫不食，為我心惻，可用汲，王明，並受其福。", xiang: "井渫不食，行惻也。求王明，受福也。" },
            { text: "六四：井甃，無咎。", xiang: "井甃無咎，修井也。" },
            { text: "九五：井冽，寒泉食。", xiang: "寒泉之食，中正也。" },
            { text: "上六：井收勿幕，有孚元吉。", xiang: "元吉在上，大成也。" }
        ]
    },
    "101110": { 
        name: "澤火革", 
        guaci: "巳日乃孚，元亨利貞，悔亡。", 
        tuan: "革，水火相殆，二女同居，其志不相得，曰革。", 
        daxiang: "澤中有火，革。君子以治曆明時。",
        yaoci: [
            { text: "初九：鞏用黃牛之革。", xiang: "鞏用黃牛，不可以有為也。" },
            { text: "六二：巳日乃革之，征吉，無咎。", xiang: "巳日革之，行有嘉也。" },
            { text: "九三：征凶，貞厲，革言三就，有孚。", xiang: "革言三就，又何之矣。" },
            { text: "九四：悔亡，有孚改命，吉。", xiang: "改命之吉，信志也。" },
            { text: "九五：大人虎變，未占有孚。", xiang: "大人虎變，其文炳也。" },
            { text: "上六：君子豹變，小人革面，征凶，居貞吉。", xiang: "君子豹變，其文蔚也。小人革面，順以從君也。" }
        ]
    },
    "011101": { 
        name: "火風鼎", 
        guaci: "元吉，亨。", 
        tuan: "鼎，象也。以木巽火，亨飪也。聖人亨以享上帝，而大亨以養聖賢。", 
        daxiang: "木上有火，鼎。君子以正位凝命。",
        yaoci: [
            { text: "初六：鼎顛趾，利出否，得妾以其子，無咎。", xiang: "鼎顛趾，未悖也。利出否，以從貴也。" },
            { text: "九二：鼎有實，我仇有疾，不我能即，吉。", xiang: "鼎有實，慎所之也。我仇有疾，終無尤也。" },
            { text: "九三：鼎耳革，其行塞，雉膏不食，方雨虧悔，終吉。", xiang: "鼎耳革，失其義也。" },
            { text: "九四：鼎折足，覆公餗，其形渥，凶。", xiang: "覆公餗，信如何也。" },
            { text: "六五：鼎黃耳金鉉，利貞。", xiang: "鼎黃耳，中以為實也。" },
            { text: "上九：鼎玉鉉，大吉，無不利。", xiang: "玉鉉在上，剛柔節也。" }
        ]
    },
    "100100": { 
        name: "震為雷", 
        guaci: "亨。震來虩虩，笑言啞啞。震驚百里，不喪匕鬯。", 
        tuan: "震，亨。震來虩虩，恐致福也。笑言啞啞，後有則也。震驚百里，驚遠而懼邇也。", 
        daxiang: "洊雷，震。君子以恐懼修省。",
        yaoci: [
            { text: "初九：震來虩虩，後笑言啞啞，吉。", xiang: "震來虩虩，恐致福也。笑言啞啞，後有則也。" },
            { text: "六二：震來厲，億喪貝，躋于九陵，勿逐，七日得。", xiang: "震來厲，乘剛也。" },
            { text: "六三：震蘇蘇，震行無眚。", xiang: "震蘇蘇，位不當也。" },
            { text: "九四：震遂泥。", xiang: "震遂泥，未光也。" },
            { text: "六五：震往來厲，億無喪，有事。", xiang: "震往來厲，危行也。其事在中，大無喪也。" },
            { text: "上六：震索索，視矍矍，征凶；震不于其躬，于其鄰，無咎，婚媾有言。", xiang: "震索索，中未得也。雖凶無咎，畏鄰戒也。" }
        ]
    },
    "001001": { 
        name: "艮為山", 
        guaci: "艮其背，不獲其身，行其庭，不見其人，無咎。", 
        tuan: "艮，止也。時止則止，時行則行，動靜不失其時，其道光明。", 
        daxiang: "兼山，艮。君子以思不出其位。",
        yaoci: [
            { text: "初六：艮其趾，無咎，利永貞。", xiang: "艮其趾，未失正也。" },
            { text: "六二：艮其腓，不拯其隨，其心不快。", xiang: "不拯救其隨，未退聽也。" },
            { text: "九三：艮其限，列其夤，厲薰心。", xiang: "艮其限，危薰心也。" },
            { text: "六四：艮其身，無咎。", xiang: "艮其身，止諸躬也。" },
            { text: "六五：艮其輔，言有序，悔亡。", xiang: "艮其輔，以中正也。" },
            { text: "上九：敦艮，吉。", xiang: "敦艮之吉，以厚終也。" }
        ]
    },
    "001011": { 
        name: "風山漸", 
        guaci: "女歸吉，利貞。", 
        tuan: "漸之進也，女歸吉也。進得位，往有功也。進以正，可以正邦也。", 
        daxiang: "山上有木，漸。君子以居賢德，善俗。",
        yaoci: [
            { text: "初六：鴻漸于干，小子厲，有言，無咎。", xiang: "小子之厲，義無咎也。" },
            { text: "六二：鴻漸于磐，飲食衎衎，吉。", xiang: "飲食衎衎，不素飽也。" },
            { text: "九三：鴻漸于陸，夫征不復，婦孕不育，凶，利禦寇。", xiang: "夫征不復，離群醜也。婦孕不育，失其道也。利用禦寇，順相保也。" },
            { text: "六四：鴻漸于木，或得其桷，無咎。", xiang: "或得其桷，順以巽也。" },
            { text: "九五：鴻漸于陵，婦三歲不孕，終莫之勝，吉。", xiang: "終莫之勝吉，得所願也。" },
            { text: "上九：鴻漸于逵，其羽可用為儀，吉。", xiang: "其羽可用為儀吉，不可亂也。" }
        ]
    },
    "110100": { 
        name: "雷澤歸妹", 
        guaci: "征凶，無攸利。",

    "101100": {

    "001101": {

    },
    "110011": { 
        name: "風澤中孚", 
        guaci: "豚魚吉，利涉大川，利貞。",

        daxiang: "澤上有風，中孚。君子以議獄緩死。",
        yaoci: [
            { text: "初九：虞吉，有它不燕。", xiang: "初九虞吉，志未變也。" },
            { text: "九二：鳴鶴在陰，其子和之；我有好爵，吾與爾靡之。", xiang: "其子和之，中心願也。" },
            { text: "六三：得敵，或鼓或罷，或泣或歌。", xiang: "或鼓或罷，位不當也。" },

    "001100": { 
        name: "雷山小過", 
        guaci: "亨，利貞，可小事，不可大事。飛鳥遺之音，不宜上宜下，大吉。",

            { text: "初六：飛鳥以凶。", xiang: "飛鳥以凶，不可如何也。" },

    "010101": {

    let currentState = [0, 0, 0, 0, 0, 0]; 
    const yaoNames = ["初爻", "二爻", "三爻", "四爻", "五爻", "上爻"];

    function render() {
        const key = currentState.join('');
        const data = hexData[key] || { name: "數據待填充", guaci: "...", tuan: "...", daxiang: "...", yaoci: [] };
        const container = document.getElementById('guaContainer');
        container.innerHTML = '';
        
        // 卦畫從上到下：上爻(index5)→初爻(index0)
        [...currentState].reverse().forEach((bit, revIndex) => {
            const index = 5 - revIndex;
            const wrapper = document.createElement('div');
            wrapper.className = 'line-wrapper';
            const label = document.createElement('div');
            label.className = 'line-label';
            label.innerText = yaoNames[index];
            const body = document.createElement('div');
            body.className = `line-body ${bit === 1 ? 'yang' : 'yin'}`;
            if (bit === 0) {
                body.innerHTML = '<span></span><div class="gap"></div><span></span>';
            }
            wrapper.appendChild(label);
            wrapper.appendChild(body);
            wrapper.onclick = () => {
                currentState[index] = currentState[index] === 1 ? 0 : 1;
                render();
            };
            container.appendChild(wrapper);
        });

        document.getElementById('guaName').innerText = data.name;
        document.getElementById('guaci').innerText = data.guaci;
        document.getElementById('tuan').innerText = data.tuan;
        document.getElementById('daxiang').innerText = data.daxiang;

        const yaociList = document.getElementById('yaociList');
        // 爻辭從上到下：上爻→初爻
        yaociList.innerHTML = [...data.yaoci].reverse().map(yao => `
            <div class="yao-card">
                <div class="yao-title">${yao.text}</div>
                <div class="xiaoxiang">小象曰：${yao.xiang}</div>
            </div>
        `).join('');
    }
    render();
</script>
